services:
  - type: web
    name: lumina-app
    env: node
    plan: free
    buildCommand: npm install --omit=optional
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_TYPE
        value: postgres
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: lumina-db
          property: connectionString

databases:
  - name: lumina-db
    databaseName: lumina
    user: lumina_user
    plan: free
