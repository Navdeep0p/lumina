# render.yaml — Deploy to Render.com (free tier available)
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: lumina-app
    env: node
    plan: free           # change to "starter" for always-on
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true      # Render auto-generates a secure random value
      - key: DB_TYPE
        value: postgres
      - key: DATABASE_URL
        fromDatabase:
          name: lumina-db
          property: connectionString

databases:
  - name: lumina-db
    databaseName: lumina
    user: lumina_user
    plan: free
